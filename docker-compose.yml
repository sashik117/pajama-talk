services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pajamatalk
      POSTGRES_USER: pajama
      POSTGRES_PASSWORD: pajama
    ports:
      - "5432:5432"
    volumes:
      - pajamatalk_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pajama -d pajamatalk"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      PAJAMA_ENV: docker
      PAJAMA_DATABASE_URL: postgresql+psycopg://pajama:pajama@postgres:5432/pajamatalk
      PAJAMA_JWT_SECRET: ${PAJAMA_JWT_SECRET:-dev-only-change-me}
      PAJAMA_CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://localhost:3175,http://127.0.0.1:3175
      PAJAMA_GEMINI_API_KEY: ${PAJAMA_GEMINI_API_KEY:-}
      PAJAMA_GEMINI_MODEL: ${PAJAMA_GEMINI_MODEL:-gemini-2.0-flash}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pajamatalk_pg_data:
